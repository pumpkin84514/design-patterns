<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>23种设计模式 · 动手搭建指南</title>
  <style>body{margin:0;padding:0;}</style>
  <script>
    (async function() {
      const chunks = [];
      for (let i = 1; i <= 8; i++) {
        const resp = await fetch('chunk' + i + '.html');
        chunks.push(await resp.text());
      }
      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;border:none;';
      document.body.appendChild(iframe);
      iframe.contentDocument.open();
      iframe.contentDocument.write(chunks.join(''));
      iframe.contentDocument.close();
    })();
  </script>
</head>
<body>Loading 23种设计模式...</body>
</html>
