<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>分布式系统模式 · 速查表</title>
<style>
:root {
  --c-comm: #3b82f6; --c-transaction: #10b981; --c-data: #f59e0b; --c-fault: #ef4444;
  --c-cache: #8b5cf6; --c-arch: #06b6d4;
  --bg: #f0f2f5; --card: #ffffff; --text: #2d3436; --muted: #636e72;
  --shadow: 0 4px 20px rgba(0,0,0,0.08); --radius: 16px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', 'Microsoft YaHei', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 50px 20px 30px; text-align: center; position: relative; overflow: hidden; }
header::before { content:''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 30px 30px; opacity: 0.3; }
header h1 { font-size: 2.4rem; font-weight: 800; margin-bottom: 10px; position: relative; z-index: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
header p { font-size: 1rem; opacity: 0.9; max-width: 600px; margin: 0 auto; position: relative; z-index: 1; }

.nav-bar { display: flex; justify-content: center; gap: 20px; padding: 16px; background: white; border-bottom: 1px solid #eee; }
.nav-bar a { color: #667eea; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
.nav-bar a:hover { text-decoration: underline; }

.filter-bar { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; padding: 20px 16px; max-width: 1000px; margin: 0 auto; }
.filter-btn { padding: 10px 24px; border: none; border-radius: 30px; background: white; color: var(--text); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.filter-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
.filter-btn.active { color: white; }
.filter-btn[data-cat="all"].active { background: linear-gradient(135deg, #667eea, #764ba2); }
.filter-btn[data-cat="comm"].active { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
.filter-btn[data-cat="transaction"].active { background: linear-gradient(135deg, #10b981, #34d399); }
.filter-btn[data-cat="data"].active { background: linear-gradient(135deg, #f59e0b, #fbbf24); }
.filter-btn[data-cat="fault"].active { background: linear-gradient(135deg, #ef4444, #f87171); }
.filter-btn[data-cat="cache"].active { background: linear-gradient(135deg, #8b5cf6, #a78bfa); }
.filter-btn[data-cat="arch"].active { background: linear-gradient(135deg, #06b6d4, #22d3ee); }

.search-box { max-width: 500px; margin: 0 auto 16px; padding: 0 16px; }
.search-box input { width: 100%; padding: 14px 24px; border: 2px solid #e0e0e0; border-radius: 30px; font-size: 1rem; outline: none; transition: all 0.3s; background: white; }
.search-box input:focus { border-color: #667eea; box-shadow: 0 0 0 4px rgba(102,126,234,0.15); }

.quick-tip { background: #fff8e1; border: 1px solid #ffe0b2; border-radius: 12px; padding: 16px; max-width: 800px; margin: 0 auto 20px; text-align: center; }
.quick-tip h3 { color: #e65100; margin-bottom: 6px; font-size: 1rem; }
.quick-tip p { color: #666; font-size: 0.9rem; }

.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }

.card { background: var(--card); border-radius: var(--radius); padding: 24px; cursor: pointer; transition: all 0.3s ease; box-shadow: var(--shadow); position: relative; overflow: hidden; border: 1px solid #f0f0f0; }
.card:hover { transform: translateY(-6px) scale(1.01); box-shadow: 0 12px 40px rgba(0,0,0,0.12); border-color: #667eea; }
.card.hidden { display: none !important; }

.card-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.card-badge.comm { background: #e8f4fd; color: #3b82f6; }
.card-badge.transaction { background: #e8f8f5; color: #10b981; }
.card-badge.data { background: #fff8e1; color: #f59e0b; }
.card-badge.fault { background: #ffeaea; color: #ef4444; }
.card-badge.cache { background: #f0e8ff; color: #8b5cf6; }
.card-badge.arch { background: #e0f7ff; color: #06b6d4; }

.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.card-header .emoji { font-size: 2.2rem; }
.card-header .name-area { flex: 1; }
.card-header .name-area h3 { font-size: 1.2rem; font-weight: 700; color: var(--text); }
.card-header .name-area .en { font-size: 0.78rem; color: #999; }

.card .analogy { font-size: 0.95rem; color: #444; line-height: 1.7; margin-bottom: 12px; background: #f8f9fa; padding: 12px 14px; border-radius: 10px; border-left: 3px solid #667eea; }

.card .memory-anchor { font-size: 0.85rem; color: #888; margin-bottom: 14px; padding: 8px 12px; background: #fffbe6; border-radius: 8px; border: 1px dashed #ffd93d; }
.card .memory-anchor strong { color: #e65100; }

.card .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
.card .card-footer .scene-tag { font-size: 0.78rem; color: #888; background: #f0f0f0; padding: 4px 10px; border-radius: 20px; }
.card .card-footer .click-hint { font-size: 0.8rem; color: #667eea; font-weight: 600; display: flex; align-items: center; gap: 4px; }
.card .card-footer .click-hint::after { content: '›'; font-size: 1.1rem; }
.card:hover .card-footer .click-hint { color: #764ba2; }

.card-comm { border-left: 4px solid var(--c-comm); }
.card-transaction { border-left: 4px solid var(--c-transaction); }
.card-data { border-left: 4px solid var(--c-data); }
.card-fault { border-left: 4px solid var(--c-fault); }
.card-cache { border-left: 4px solid var(--c-cache); }
.card-arch { border-left: 4px solid var(--c-arch); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.show { display: flex; }
.modal { background: white; border-radius: var(--radius); max-width: 850px; width: 100%; max-height: 92vh; overflow-y: auto; box-shadow: 0 25px 80px rgba(0,0,0,0.3); animation: modalIn 0.3s ease; }
@keyframes modalIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

.modal-header { padding: 28px 32px 20px; border-bottom: 1px solid #f0f0f0; position: relative; }
.modal-header .pattern-id { font-size: 0.8rem; color: #999; margin-bottom: 6px; }
.modal-header h2 { font-size: 1.8rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.modal-header .close-btn { position: absolute; top: 16px; right: 20px; width: 40px; height: 40px; border-radius: 50%; border: none; background: #f5f5f5; cursor: pointer; font-size: 1.4rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
.modal-header .close-btn:hover { background: #ff6b6b; color: white; }

.modal-body { padding: 24px 32px 32px; }

.memory-section { background: linear-gradient(135deg, #fffbe6 0%, #fff3cd 100%); border: 2px solid #ffd93d; border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; }
.memory-section h4 { font-size: 0.95rem; color: #e65100; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.memory-section .link-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
.memory-section .link-row .arrow { font-size: 1.2rem; color: #ccc; }
.memory-section .link-box { background: white; padding: 10px 16px; border-radius: 10px; border: 1px solid #e0e0e0; font-size: 0.92rem; flex: 1; min-width: 200px; }
.memory-section .link-box.name { border-color: #667eea; color: #667eea; font-weight: 700; font-size: 1rem; }
.memory-section .link-box.analogy { border-color: #ff6b6b; color: #444; }
.memory-section .link-box.core { border-color: #4ecdc4; color: #444; }
.memory-section .link-box .label { font-size: 0.72rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 3px; }
.memory-section .memory-tip { margin-top: 14px; padding: 12px 16px; background: white; border-radius: 8px; font-size: 0.9rem; color: #666; border-left: 3px solid #ffd93d; }
.memory-section .memory-tip strong { color: #e65100; }

.parts-section { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; }
.parts-section h4 { font-size: 0.95rem; color: #16a34a; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.parts-section .parts-list { list-style: none; padding: 0; }
.parts-section .parts-list li { padding: 10px 14px; background: white; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid #22c55e; font-size: 0.9rem; color: #444; }
.parts-section .parts-list li strong { color: #16a34a; }

.steps-section { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 14px; padding: 20px 24px; margin-bottom: 24px; }
.steps-section h4 { font-size: 0.95rem; color: #2563eb; margin-bottom: 12px; }
.steps-section .steps-list { padding-left: 20px; }
.steps-section .steps-list li { padding: 10px 0; font-size: 0.9rem; color: #444; line-height: 1.7; border-bottom: 1px dashed #dbeafe; }
.steps-section .steps-list li:last-child { border-bottom: none; }
.steps-section .steps-list li::marker { color: #3b82f6; font-weight: 700; }

.when-to-use { background: #f0f7ff; border: 1px solid #bfdbfe; border-radius: 12px; padding: 18px 24px; margin: 20px 0; }
.when-to-use h4 { font-size: 0.95rem; color: #2563eb; margin-bottom: 10px; }
.when-to-use p { font-size: 0.93rem; color: #444; line-height: 1.8; }
.when-to-use .trigger { display: inline-block; background: #dbeafe; color: #1d4ed8; padding: 4px 12px; border-radius: 20px; font-size: 0.82rem; font-weight: 600; margin: 2px 4px; }

.modal-body .code-section { margin: 20px 0; }
.modal-body pre { background: #1e1e2e; color: #cdd6f4; padding: 18px; border-radius: 12px; overflow-x: auto; font-size: 0.82rem; line-height: 1.7; }
.modal-body code { font-family: 'Consolas', 'Monaco', monospace; }
.modal-body .scene-tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 20px; }
.modal-body .scene-tag { background: #f0f0f0; padding: 6px 14px; border-radius: 20px; font-size: 0.85rem; color: #555; }

.pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 18px; }
@media (max-width: 600px) { .pros-cons { grid-template-columns: 1fr; } .cards-grid { grid-template-columns: 1fr; } header h1 { font-size: 1.8rem; } }
.pros, .cons { padding: 16px; border-radius: 12px; }
.pros { background: #e8f8f5; }
.cons { background: #fff0f0; }
.pros h5 { color: #00b894; margin-bottom: 8px; font-size: 0.9rem; }
.cons h5 { color: #d63031; margin-bottom: 8px; font-size: 0.9rem; }
.pros ul, .cons ul { padding-left: 18px; font-size: 0.88rem; color: #444; }
.pros li, .cons li { margin: 6px 0; }

.section-title { max-width: 1200px; margin: 0 auto; padding: 0 20px 16px; font-size: 1.1rem; font-weight: 700; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>☁️ 分布式系统模式 · 速查表</h1>
  <p>解决分布式系统的通信、事务、容错、一致性难题</p>
</header>

<div class="nav-bar">
  <a href="index.html">← 返回首页</a>
  <a href="distributed_patterns_guide.html">查看详细讲解 →</a>
</div>

<div class="quick-tip">
  <h3>💡 记忆口诀</h3>
  <p>通信要防断 · 事务要一致 · 故障要隔离 · 缓存要同步</p>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="🔍 搜索模式、场景或关键词..." />
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-cat="all">全部</button>
  <button class="filter-btn" data-cat="comm">服务通信</button>
  <button class="filter-btn" data-cat="transaction">分布式事务</button>
  <button class="filter-btn" data-cat="data">数据一致性</button>
  <button class="filter-btn" data-cat="fault">容错弹性</button>
  <button class="filter-btn" data-cat="cache">缓存策略</button>
  <button class="filter-btn" data-cat="arch">架构模式</button>
</div>

<div class="cards-grid" id="cardsGrid"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal"></div>
</div>

<script>
const data = [
  { id: 1, cat: 'comm', name: '熔断器', en: 'Circuit Breaker', emoji: '🔌', analogy: '电路跳闸保护', anchor: '断路 = 保护 = 级联故障', scene: '第三方调用' },
  { id: 2, cat: 'comm', name: '重试退避', en: 'Retry with Backoff', emoji: '🔄', analogy: '打电话没人接，隔久一点再打', anchor: '重试 = 指数退避 = 瞬态失败', scene: '网络不稳定' },
  { id: 3, cat: 'comm', name: '超时控制', en: 'Timeout', emoji: '⏱️', analogy: '等人不能超过10分钟', anchor: '上限 = 阻塞 = 资源保护', scene: '远程调用' },
  { id: 4, cat: 'comm', name: '幂等性', en: 'Idempotency', emoji: '🔁', analogy: '按电梯按钮多次，结果一样', anchor: '重复 = 防重 = 网络抖动', scene: '支付接口' },
  { id: 5, cat: 'transaction', name: 'Saga 模式', en: 'Saga', emoji: '📜', analogy: '旅行订房失败，取消机票', anchor: '补偿 = 回滚 = 最终一致', scene: '跨服务事务' },
  { id: 6, cat: 'transaction', name: 'TCC 事务', en: 'TCC', emoji: '🤝', analogy: '先冻结资金，成功再扣款', anchor: '预留 = 确认 = 取消', scene: '电商下单' },
  { id: 7, cat: 'transaction', name: '两阶段提交', en: '2PC', emoji: '🗳️', analogy: '大家举手表决，一致再执行', anchor: '强一致 = 阻塞 = 协调者', scene: '数据库事务' },
  { id: 8, cat: 'data', name: '事件溯源', en: 'Event Sourcing', emoji: '📨', analogy: '记账本只记流水，不记余额', anchor: '事件流 = 回放 = 审计', scene: '审计追踪' },
  { id: 9, cat: 'data', name: 'CQRS', en: 'CQRS', emoji: '📖', analogy: '前台和后台用不同账本', anchor: '读写分离 = 优化 = 不同模型', scene: '读写差异大' },
  { id: 10, cat: 'data', name: 'Outbox', en: 'Outbox', emoji: '📬', analogy: '写信先放草稿箱，再统一发', anchor: '事务 = 消息 = 一致', scene: '消息发布' },
  { id: 11, cat: 'data', name: '最终一致性', en: 'Eventual Consistency', emoji: '⏳', analogy: '同步需要时间，最终会一致', anchor: '暂时不一致 = 同步 = 延迟', scene: '分布式数据' },
  { id: 12, cat: 'fault', name: '舱壁隔离', en: 'Bulkhead', emoji: '🛡️', analogy: '船舱隔离，进水不沉全船', anchor: '隔离 = 资源池 = 故障扩散', scene: '资源保护' },
  { id: 13, cat: 'fault', name: '限流', en: 'Rate Limiting', emoji: '🚦', analogy: '收费站限流，防止拥堵', anchor: '限速 = 保护 = 流量控制', scene: '高并发保护' },
  { id: 14, cat: 'fault', name: '降级', en: 'Graceful Degradation', emoji: '🔽', analogy: '主灯坏了，开备用灯', anchor: '保核心 = 简化 = 有损服务', scene: '故障应对' },
  { id: 15, cat: 'fault', name: '故障转移', en: 'Failover', emoji: '🔄', analogy: '主唱生病，替补上场', anchor: '高可用 = 备份 = 自动切换', scene: '高可用架构' },
  { id: 16, cat: 'cache', name: 'Cache-Aside', en: 'Cache-Aside', emoji: '📦', analogy: '自己管抽屉，用不到的不拿', anchor: '应用管理 = 补充 = 常用', scene: '缓存策略' },
  { id: 17, cat: 'cache', name: 'Write-Through', en: 'Write-Through', emoji: '✍️', analogy: '记账同时写两份', anchor: '强一致 = 同步写 = 实时', scene: '缓存一致性' },
  { id: 18, cat: 'cache', name: 'Write-Behind', en: 'Write-Behind', emoji: '📝', analogy: '先记便签，下班再整理', anchor: '异步 = 批量 = 性能', scene: '写性能优化' },
  { id: 19, cat: 'arch', name: 'API 网关', en: 'API Gateway', emoji: '🚪', analogy: '酒店前台，统一接待', anchor: '统一入口 = 聚合 = 屏蔽', scene: '微服务入口' },
  { id: 20, cat: 'arch', name: 'BFF', en: 'BFF', emoji: '🎭', analogy: '为不同客人定制菜单', anchor: '前端定制 = 聚合 = 适配', scene: '前端适配' },
  { id: 21, cat: 'arch', name: '主节点选举', en: 'Leader Election', emoji: '👑', analogy: '选班长，只有一个班长', anchor: '协调 = 决策 = 一致性', scene: '集群协调' },
  { id: 22, cat: 'arch', name: '配置中心', en: 'Config Center', emoji: '⚙️', analogy: '公告栏，大家都能看到', anchor: '集中 = 动态 = 同步', scene: '配置管理' }
];

const catNames = { all: '全部', comm: '服务通信', transaction: '分布式事务', data: '数据一致性', fault: '容错弹性', cache: '缓存策略', arch: '架构模式' };

const catBadges = { comm: 'comm', transaction: 'transaction', data: 'data', fault: 'fault', cache: 'cache', arch: 'arch' };
const catCards = { comm: 'comm', transaction: 'transaction', data: 'data', fault: 'fault', cache: 'cache', arch: 'arch' };

const cardsGrid = document.getElementById('cardsGrid');

function renderCards(filter = 'all') {
  cardsGrid.innerHTML = '';
  data.forEach(item => {
    if (filter !== 'all' && item.cat !== filter) return;
    const card = document.createElement('div');
    card.className = `card card-${catCards[item.cat]}`;
    card.setAttribute('data-cat', item.cat);
    card.innerHTML = `
      <div class="card-badge ${catBadges[item.cat]}">${catNames[item.cat]}</div>
      <div class="card-header">
        <div class="emoji">${item.emoji}</div>
        <div class="name-area">
          <h3>${item.name}</h3>
          <div class="en">${item.en}</div>
        </div>
      </div>
      <div class="analogy">${item.analogy}</div>
      <div class="memory-anchor"><strong>💡 记忆锚点：</strong>${item.anchor}</div>
      <div class="card-footer">
        <span class="scene-tag">${item.scene}</span>
        <span class="click-hint">点击详情 ›</span>
      </div>
    `;
    card.addEventListener('click', () => openModal(item.id));
    cardsGrid.appendChild(card);
  });
}

const modalOverlay = document.getElementById('modalOverlay');
const modal = document.getElementById('modal');

function openModal(id) {
  const item = data.find(d => d.id === id);
  if (!item) return;
  modal.innerHTML = `
    <div class="modal-header">
      <div class="pattern-id">DISTRIBUTED · ${catNames[item.cat]}</div>
      <h2><span style="font-size:2.2rem">${item.emoji}</span> <span style="color:#3b82f6">${item.name}</span> <span style="font-size:0.85rem;color:#999">${item.en}</span></h2>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="memory-section">
        <h4><span class="icon">🔗</span> 记忆锚点</h4>
        <div class="link-row">
          <div class="link-box name">${item.name}</div>
          <div class="arrow">→</div>
          <div class="link-box analogy">${item.analogy}</div>
        </div>
        <div class="memory-tip"><strong>💡 记忆口诀：</strong>${item.anchor}</div>
      </div>
      <div class="when-to-use">
        <h4>🤔 什么时候用它？</h4>
        <p>${item.scene}</p>
      </div>
      <div class="code-section">
        <h4>💻 极简代码</h4>
        <pre><code>// ${item.name} 的 JavaScript 实现示例
// 详见 distributed_patterns_guide.html</code></pre>
      </div>
    </div>
  `;
  modalOverlay.classList.add('show');
}

function closeModal() { modalOverlay.classList.remove('show'); }
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

// Filter
const filterBtns = document.querySelectorAll('.filter-btn');
filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCards(btn.dataset.cat);
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.toLowerCase().trim();
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    const text = card.textContent.toLowerCase();
    card.classList.toggle('hidden', q && !text.includes(q));
  });
});

renderCards();
</script>

</body>
</html>
